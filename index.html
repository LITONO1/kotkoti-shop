<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>স্বপ্ন শপ</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
scroll-behavior:smooth;
}

body{
background:#f6f7fb;
color:#111827;
}

/* NAVBAR */

.navbar{
width:100%;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
background:linear-gradient(90deg,#071b36,#0f2d57);
}

.logo{
font-size:28px;
font-weight:700;
color:#fff;
}

.logo span{
color:#ffb300;
}

.nav-links{
display:flex;
gap:20px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:15px;
font-weight:600;
}

/* HERO */

.hero{
width:100%;
min-height:58vh;
display:flex;
align-items:center;
padding:50px 5%;
background:
linear-gradient(rgba(7,18,40,.45),rgba(7,18,40,.45)),
url('https://images.unsplash.com/photo-1570222094114-d054a817e56b?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
color:white;
}

.hero-left{
max-width:560px;
}

.hero-left h1{
font-size:48px;
line-height:1.2;
margin-bottom:15px;
}

.hero-left p{
font-size:17px;
line-height:1.8;
margin-bottom:25px;
}

/* BUTTON */

.hero-btn{
display:inline-block;
padding:14px 30px;
background:linear-gradient(45deg,#ffb300,#ff7b00);
color:white;
text-decoration:none;
font-size:16px;
font-weight:700;
border-radius:14px;
transition:.3s;
}

.hero-btn:hover{
transform:scale(1.05);
}

/* SECTION */

.section{
padding:45px 5%;
}

.section-title{
font-size:32px;
text-align:center;
margin-bottom:30px;
}

/* PRODUCTS */

.products{
display:flex;
flex-direction:column;
gap:25px;
}

.card{
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:auto;
max-height:430px;
object-fit:contain;
background:#fff;
padding:12px;
}

.card-body{
padding:18px;
}

.card-title{
font-size:26px;
font-weight:700;
margin-bottom:6px;
}

.old-price{
font-size:15px;
text-decoration:line-through;
color:#9ca3af;
}

.new-price{
font-size:32px;
font-weight:700;
color:#ff8a00;
margin-top:6px;
}

/* DESCRIPTION */

.desc-btn{
margin-top:14px;
background:#fff3d0;
padding:11px;
border-radius:12px;
cursor:pointer;
font-size:14px;
font-weight:700;
}

.features{
display:none;
margin-top:12px;
font-size:14px;
line-height:1.8;
background:#f9fafb;
padding:12px;
border-radius:10px;
}

/* ORDER BUTTON */

.order-btn{
width:100%;
padding:14px;
margin-top:16px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#ffb300,#ff7b00);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

/* FORM */

.order-form{
display:none;
margin-top:15px;
padding:15px;
border-radius:14px;
background:#f8fafc;
}

.order-form input,
.order-form textarea{
width:100%;
padding:13px;
margin-top:10px;
border:none;
outline:none;
border-radius:10px;
background:#e5e7eb;
}

.confirm-btn{
width:100%;
padding:13px;
margin-top:12px;
border:none;
border-radius:12px;
background:#16a34a;
color:white;
font-size:15px;
font-weight:700;
cursor:pointer;
}

/* FOOTER */

.footer{
margin-top:40px;
padding:28px;
text-align:center;
background:linear-gradient(90deg,#071b36,#0f2d57);
color:white;
}

/* MOBILE */

@media(max-width:768px){

.logo{
font-size:22px;
}

.hero{
min-height:42vh;
padding:35px 5%;
}

.hero-left h1{
font-size:30px;
}

.hero-left p{
font-size:14px;
}

.products{
gap:18px;
}

.card img{
max-height:260px;
}

.card-title{
font-size:19px;
}

.new-price{
font-size:24px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo" id="logoText">
স্বপ্ন <span>শপ</span>
</div>

<div class="nav-links">
<a href="#">হোম</a>
<a href="#products">প্রোডাক্ট</a>
</div>

</nav>

<!-- HERO -->

<section class="hero" id="heroSection">

<div class="hero-left">

<h1 id="heroText">
আপনার রান্নার সেরা সঙ্গী
</h1>

<p id="heroSubText">
প্রিমিয়াম ব্লেন্ডার দিয়ে তৈরি করুন স্বাস্থ্যকর ও সুস্বাদু খাবার।
</p>

<a href="#products" class="hero-btn">
এখনই অর্ডার করুন
</a>

</div>

</section>

<!-- PRODUCTS -->

<section class="section" id="products">

<h2 class="section-title">
আমাদের জনপ্রিয় প্রোডাক্ট
</h2>

<div class="products" id="productList"></div>

</section>

<!-- FOOTER -->

<footer class="footer" id="footerText">
© ২০২৬ স্বপ্ন শপ
</footer>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey:"AIzaSyAzXwo_DPBe6PQPiTvqkefiLE2Mo3D3B0E",
authDomain:"kotkoti.firebaseapp.com",
databaseURL:"https://kotkoti-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"kotkoti"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* SETTINGS */

db.ref("settings/logo").on("value",(snap)=>{
if(snap.exists()){
document.getElementById("logoText").innerHTML = snap.val();
}
});

db.ref("settings/heroText").on("value",(snap)=>{
if(snap.exists()){
document.getElementById("heroText").innerText = snap.val();
}
});

db.ref("settings/subText").on("value",(snap)=>{
if(snap.exists()){
document.getElementById("heroSubText").innerText = snap.val();
}
});

db.ref("settings/background").on("value",(snap)=>{
if(snap.exists()){

document.getElementById("heroSection").style.background =
`linear-gradient(rgba(7,18,40,.45),rgba(7,18,40,.45)),
url(${snap.val()}) center/cover no-repeat`;

}
});

db.ref("settings/footer").on("value",(snap)=>{
if(snap.exists()){
document.getElementById("footerText").innerText = snap.val();
}
});

/* PRODUCTS */

db.ref("products").on("value",(snapshot)=>{

let box = document.getElementById("productList");

box.innerHTML = "";

snapshot.forEach((child)=>{

let p = child.val();

box.innerHTML += `

<div class="card">

<img src="${p.image}" alt="product">

<div class="card-body">

<div class="card-title">
${p.name || ""}
</div>

<div class="old-price">
৳${p.oldPrice || ""}
</div>

<div class="new-price">
৳${p.newPrice || ""}
</div>

<div class="desc-btn" onclick="toggleDesc(this)">
📄 বিস্তারিত দেখুন
</div>

<div class="features">
${p.features || ""}
</div>

<button class="order-btn" onclick="toggleForm(this)">
এখনই অর্ডার করুন
</button>

<div class="order-form">

<input type="text" class="name" placeholder="আপনার নাম">

<input type="text" class="phone" placeholder="ফোন নাম্বার">

<textarea class="address" placeholder="আপনার ঠিকানা"></textarea>

<button class="confirm-btn" onclick="submitOrder(this)">
অর্ডার কনফার্ম
</button>

</div>

</div>

</div>

`;

});

});

/* FUNCTIONS */

function toggleDesc(el){

let d = el.nextElementSibling;

d.style.display =
d.style.display === "block" ? "none" : "block";

}

function toggleForm(btn){

let f = btn.nextElementSibling;

f.style.display =
f.style.display === "block" ? "none" : "block";

}

function submitOrder(btn){

let f = btn.parentElement;

let name = f.querySelector(".name").value;
let phone = f.querySelector(".phone").value;
let address = f.querySelector(".address").value;

let product =
f.parentElement.querySelector(".card-title").innerText;

if(!name || !phone || !address){

alert("সব তথ্য পূরণ করুন");
return;

}

db.ref("orders/" + Date.now()).set({

product,
name,
phone,
address,
status:"Pending",
time:new Date().toLocaleString()

});

alert("অর্ডার সফল হয়েছে");

f.style.display = "none";

}

</script>

</body>
</html>
